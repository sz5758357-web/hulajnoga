<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hulajnogi - Sklep Online</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #fff; font-family: sans-serif;
            display: flex; justify-content: center; align-items: center;
        }
        #start-screen { text-align: center; cursor: pointer; }
        
        #chaos-layer {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 9999;
        }

        /* Szybkie błyski (stroboskop) */
        .flashing { animation: flash-bg 0.05s infinite; }
        @keyframes flash-bg {
            0% { background: #ff0000; }
            50% { background: #ffffff; }
            100% { background: #ff0000; }
        }

        /* Zdjęcia - tylko się pojawiają, zero ruchu */
        .spawn-img {
            position: absolute; 
            width: 200px; 
            z-index: 10000;
            pointer-events: none;
        }
    </style>
</head>
<body onclick="launchPrank()">

    <div id="start-screen">
        <h1 style="font-size: 40px;">PROMYCJA: HULAJNOGA ELEKTRYCZNA</h1>
        <div style="font-size: 120px;">🛴</div>
        <p>KLIKNIJ W DOWOLNYM MIEJSCU, ABY WEJŚĆ</p>
    </div>

    <div id="chaos-layer"></div>

    <script>
        let active = false;
        const imgPath = "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/San_Giovanni_Paolo_II.jpg/250px-San_Giovanni_Paolo_II.jpgg";

        function launchPrank() {
            if (active) return;
            active = true;

            // --- STARY DŹWIĘK: STAŁY, WYSOKI PISK ---
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth'; // Piszczący, "ostry" dźwięk
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime); // Stała częstotliwość 1000Hz
            
            gain.gain.setValueAtTime(1, audioCtx.currentTime); // Max głośność
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();

            // --- WIZUALIA ---
            document.getElementById('start-screen').style.display = 'none';
            const layer = document.getElementById('chaos-layer');
            layer.style.display = 'block';
            layer.classList.add('flashing');

            // --- RESPIENIE ZDJĘĆ ---
            const spawner = setInterval(() => {
                const img = document.createElement('img');
                img.src = imgPath;
                img.className = 'spawn-img';
                
                // Losowa pozycja
                img.style.left = Math.random() * (window.innerWidth - 200) + 'px';
                img.style.top = Math.random() * (window.innerHeight - 200) + 'px';
                
                layer.appendChild(img);

                // Znika po 1 sekundzie
                setTimeout(() => img.remove(), 1000);
            }, 40); // 25 zdjęć na sekundę

            // --- AUTO-STOP PO 3 MINUTACH ---
            setTimeout(() => {
                clearInterval(spawner);
                osc.stop();
                location.reload(); 
            }, 180000);
        }
    </script>
</body>
</html>
