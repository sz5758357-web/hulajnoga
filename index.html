<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HULAJNOGI - SKLEP</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #fff; font-family: sans-serif;
            display: flex; justify-content: center; align-items: center;
        }
        #poczatek { text-align: center; cursor: pointer; }
        
        #chaos {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 9999;
        }

        /* SZYBKIE BŁYSKI TŁA */
        .strobe-active { animation: strobe 0.07s infinite; }
        @keyframes strobe {
            0% { background: #ff0000; }
            50% { background: #fff; }
            100% { background: #ff0000; }
        }

        /* EFEKT TRZĘSIENIA (ZAMIAST KRĘCENIA) */
        .shake-img {
            position: absolute; width: 200px; z-index: 10000;
            animation: shake 0.1s infinite;
        }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            25% { transform: translate(-2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            75% { transform: translate(2px, -2px); }
            100% { transform: translate(2px, 2px); }
        }
    </style>
</head>
<body onclick="start()">

    <div id="poczatek">
        <h1>PROMOCJA NA HULAJNOGI</h1>
        <div style="font-size:100px">🛴</div>
        <p>KLIKNIJ, ABY ZOBACZYĆ CENĘ</p>
    </div>

    <div id="chaos"></div>

    <script>
        let isOn = false;
        const imgUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/San_Giovanni_Paolo_II.jpg/250px-San_Giovanni_Paolo_II.jpg";

        function start() {
            if (isOn) return;
            isOn = true;

            // AUDIO (Syrena)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            gain.gain.setValueAtTime(1, audioCtx.currentTime);

            setInterval(() => {
                osc.frequency.setValueAtTime(Math.random() * 1000 + 500, audioCtx.currentTime);
            }, 100);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();

            // WIZUALIA
            document.getElementById('poczatek').style.display = 'none';
            const container = document.getElementById('chaos');
            container.style.display = 'block';
            container.classList.add('strobe-active');

            // SPAWN ZDJĘĆ (TRZĘSĄCYCH SIĘ)
            setInterval(() => {
                const img = document.createElement('img');
                img.src = imgUrl;
                img.className = 'shake-img';
                img.style.left = Math.random() * (window.innerWidth - 150) + 'px';
                img.style.top = Math.random() * (window.innerHeight - 150) + 'px';
                container.appendChild(img);
                setTimeout(() => img.remove(), 1200);
            }, 80);

            // STOP PO 3 MINUTACH
            setTimeout(() => { location.reload(); }, 180000);
        }
    </script>
</body>
</html>
