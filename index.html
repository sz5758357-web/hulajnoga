<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hulajnogi - Wyprzedaż 2026</title>
    <style>
        /* Styl strony startowej */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #ffffff; font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }
        #ekran-startowy { text-align: center; cursor: pointer; z-index: 1; }
        .ikona { font-size: 100px; }
        h1 { color: #333; margin: 10px 0; }
        
        /* Kontener na chaos */
        #chaos {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; z-index: 9999;
            background: white;
        }

        /* Szybkie błyski tła (stroboskop) */
        .miganie { animation: strobe 0.05s infinite; }
        @keyframes strobe {
            0% { background: #ff0000; }
            50% { background: #ffffff; }
            100% { background: #ff0000; }
        }

        /* Zdjęcia - TYLKO POZYCJA, BEZ KRĘCENIA */
        .foto {
            position: absolute; 
            width: 200px; /* Rozmiar zdjęcia */
            height: auto;
            z-index: 10000;
            pointer-events: none; /* Żeby nie dało się w nie kliknąć */
        }
    </style>
</head>
<body onclick="uruchom()">

    <div id="ekran-startowy">
        <div class="ikona">🛴</div>
        <h1>SUPER HULAJNOGA ZA 1 ZŁ</h1>
        <p>KLIKNIJ DOWOLNE MIEJSCE, ABY ODEBRAĆ</p>
    </div>

    <div id="chaos"></div>

    <script>
        let czyDziala = false;
        const linkDoFoto = "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/San_Giovanni_Paolo_II.jpg/250px-San_Giovanni_Paolo_II.jpg";

        function uruchom() {
            if (czyDziala) return;
            czyDziala = true;

            // 1. DŹWIĘK (Głośna syrena/pisk)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square'; // Agresywny dźwięk
            gain.gain.setValueAtTime(1, audioCtx.currentTime); // Max głośność w przeglądarce

            // Zmiana tonu (efekt syreny) co 60ms
            setInterval(() => {
                osc.frequency.setValueAtTime(Math.random() * 1000 + 400, audioCtx.currentTime);
            }, 60);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();

            // 2. WIZUALIA (Miganie i ukrycie napisu)
            document.getElementById('ekran-startowy').style.display = 'none';
            const kontener = document.getElementById('chaos');
            kontener.style.display = 'block';
            kontener.classList.add('miganie');

            // 3. SZYBKIE RESPIENIE ZDJĘĆ (Co 40ms)
            const intervalSpawn = setInterval(() => {
                const img = document.createElement('img');
                img.src = linkDoFoto;
                img.className = 'foto';
                
                // Losowanie pozycji na całym ekranie
                const x = Math.random() * (window.innerWidth - 200);
                const y = Math.random() * (window.innerHeight - 200);
                
                img.style.left = x + 'px';
                img.style.top = y + 'px';
                
                kontener.appendChild(img);

                // Zdjęcie znika po 1.2 sekundy, żeby nie zamulić procesora
                setTimeout(() => img.remove(), 1200);
            }, 40);

            // 4. SAMOCZYNNE WYŁĄCZENIE PO 3 MINUTACH
            setTimeout(() => {
                clearInterval(intervalSpawn);
                osc.stop();
                location.reload(); // Odświeżenie strony po 3 minutach
            }, 180000);
        }
    </script>
</body>
</html>
