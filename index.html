<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>HULAJNOGI - SUPER PROMOCJA</title>
    <style>
        body {
            margin: 0;
            background: #fff;
            font-family: sans-serif;
            text-align: center;
            cursor: pointer;
            overflow: hidden;
            height: 100vh;
        }

        /* Wygląd strony przed kliknięciem */
        .sklep {
            padding-top: 50px;
        }
        .scooter {
            font-size: 80px;
            margin: 20px;
        }

        /* EFEKT SPECJALNY */
        #efekt {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: white;
        }

        /* Ruch zdjęcia - trzęsienie i powiększanie */
        @keyframes ruszajSie {
            0% { transform: scale(1) translate(0,0) rotate(0); }
            25% { transform: scale(1.2) translate(10px, -10px) rotate(5deg); }
            50% { transform: scale(1.5) translate(-10px, 10px) rotate(-5deg); }
            75% { transform: scale(1.2) translate(10px, 10px) rotate(5deg); }
            100% { transform: scale(1) translate(0,0) rotate(0); }
        }

        #papiez {
            height: 80%;
            margin-top: 5vh;
            animation: ruszajSie 0.3s infinite; /* Szybki, szarpany ruch */
        }

        /* Mniejsze, szybkie błyski tła */
        @keyframes blysk {
            0% { background-color: #ff0000; }
            50% { background-color: #ffffff; }
            100% { background-color: #ff0000; }
        }

        .aktywne-blyski {
            animation: blysk 0.2s infinite;
        }
    </style>
</head>
<body onclick="start()">

    <div class="sklep">
        <h1>NAJTAŃSZE HULAJNOGI W POLSCE</h1>
        <div class="scooter">🛴💨</div>
        <p>KLIKNIJ W EKRAN ABY WEJŚĆ DO SKLEPU</p>
    </div>

    <div id="efekt">
        <img id="papiez" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/San_Giovanni_Paolo_II.jpg/250px-San_Giovanni_Paolo_II.jpg">
    </div>

    <script>
        function start() {
            const ekran = document.getElementById('efekt');
            ekran.style.display = 'block';
            ekran.classList.add('aktywne-blyski');

            // Generator pisku
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            oscillator.type = 'sawtooth'; // Piszczący dźwięk
            oscillator.frequency.setValueAtTime(1500, audioCtx.currentTime); // Wysoki pisk
            oscillator.connect(audioCtx.destination);
            oscillator.start();

            // Wyłączenie po 3 minutach
            setTimeout(() => {
                ekran.style.display = 'none';
                oscillator.stop();
                location.reload(); // Odświeża stronę na koniec
            }, 180000);
        }
    </script>
</body>
</html>
