<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Sklep z Hulajnogami</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Blokuje przewijanie podczas efektów */
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            cursor: pointer;
        }

        /* Widok początkowy */
        #content {
            text-align: center;
        }

        /* Nakładka z Papieżem - domyślnie ukryta */
        #scary-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999;
            background-color: white;
            text-align: center;
        }

        #scary-overlay img {
            height: 100%;
            width: auto;
        }

        /* Animacja migania ekranu */
        @keyframes flash {
            0% { background-color: red; }
            50% { background-color: yellow; }
            100% { background-color: blue; }
        }

        .flashing {
            animation: flash 0.1s infinite;
        }
    </style>
</head>
<body onclick="startEffect()">

    <div id="content">
        <h1>Najlepsze Hulajnogi Elektryczne 2026</h1>
        <p>Kliknij gdziekolwiek na ekranie, aby zobaczyć ofertę!</p>
        <img src="https://via.placeholder.com/400x250?text=Hulajnoga+Turbo" alt="Hulajnoga">
    </div>

    <div id="scary-overlay">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Jan_Pawe%C5%82_II_-_u%C5%9bmiechni%C4%99ty.jpg/800px-Jan_Pawe%C5%82_II_-_u%C5%9bmiechni%C4%99ty.jpg" alt="Papież">
    </div>

    <script>
        function startEffect() {
            const overlay = document.getElementById('scary-overlay');
            const body = document.body;

            // 1. Pokazanie obrazu
            overlay.style.display = 'block';

            // 2. Włączenie migania
            body.classList.add('flashing');

            // 3. Dźwięk piszczący (wygenerowany przez przeglądarkę)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            oscillator.type = 'sawtooth'; // Piszczący, "ostry" dźwięk
            oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime); // Częstotliwość 1000Hz
            oscillator.connect(audioCtx.destination);
            oscillator.start();

            // 4. Wyłączenie po 3 minutach (180 000 milisekund)
            setTimeout(() => {
                overlay.style.display = 'none';
                body.classList.remove('flashing');
                oscillator.stop();
                alert("Efekt zakończony.");
            }, 180000);
        }
    </script>
</body>
</html>
