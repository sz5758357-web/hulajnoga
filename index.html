<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Hulajnogi</title>
<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#f5f5f5;
  overflow:hidden;
}

nav{
  background:#222;
  padding:15px;
}

nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

section{
  padding:50px 20px;
}

.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:30px;
}

.card{
  background:white;
  padding:20px;
  width:220px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
  width:100%;
  border-radius:6px;
}

#flash{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:red;
  opacity:0;
  pointer-events:none;
  z-index:998;
}

.flash{
  animation:kigotanie 0.05s infinite;
}

@keyframes kigotanie{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

.pope{
  position:fixed;
  width:250px;
  z-index:999;
}
</style>
</head>
<body>

<nav>
  <a href="#home">Strona główna</a>
  <a href="#hulajnogi">Hulajnogi</a>
  <a href="#kontakt">Kontakt</a>
</nav>

<section id="home">
  <h1>Najlepsze hulajnogi elektryczne</h1>
  <p>Kliknij gdziekolwiek, aby zobaczyć promocję!</p>
</section>

<section id="hulajnogi">
  <h2>Nasze hulajnogi</h2>
  <div class="container">
    <div class="card">
      <img src="hulajnoga1.jpg">
      <h3>Xiaomi M365</h3>
      <p>25 km/h</p>
      <p>1499 zł</p>
    </div>
    <div class="card">
      <img src="hulajnoga2.jpg">
      <h3>Speed Pro</h3>
      <p>35 km/h</p>
      <p>2299 zł</p>
    </div>
  </div>
</section>

<section id="kontakt">
  <h2>Kontakt</h2>
  <p>Email: hulajnogi@sklep.pl</p>
</section>

<div id="flash"></div>

<audio id="sound" loop>
  <source src="sound.mp3">
</audio>

<script>
let started=false
let interval

document.body.onclick=function(){
  if(started) return
  started=true

  // miganie całego ekranu
  document.getElementById("flash").classList.add("flash")

  // włącz dźwięk
  let sound=document.getElementById("sound")
  sound.play()

  // tworzenie wyskakujących papieży
  interval=setInterval(function(){
    for(let i=0;i<6;i++){
      let img=document.createElement("img")
      img.src="pope.jpg"
      img.className="pope"
      img.style.left=Math.random()*window.innerWidth+"px"
      img.style.top=Math.random()*window.innerHeight+"px"
      document.body.appendChild(img)
    }
  },200)

  // wyłączenie po 3 minutach
  setTimeout(function(){
    document.getElementById("flash").classList.remove("flash")
    sound.pause()
    sound.currentTime=0
    clearInterval(interval)
    document.querySelectorAll(".pope").forEach(e=>e.remove())
  },180000)
}
</script>

</body>
</html>
