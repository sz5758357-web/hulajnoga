<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Hulajnogi</title>
<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#f5f5f5;
  overflow:hidden;
}

nav{
  background:#222;
  padding:15px;
}

nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

section{
  padding:50px 20px;
}

.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:30px;
}

.card{
  background:white;
  padding:20px;
  width:220px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
  width:100%;
  border-radius:6px;
}

#flash{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:red;
  opacity:0;
  pointer-events:none;
  z-index:998;
}

.flash{
  animation:kigotanie 0.05s infinite;
}

@keyframes kigotanie{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

.pope{
  position:fixed;
  width:250px;
  z-index:999;
}
</style>
</head>
<body>

<nav>
  <a href="#home">Strona główna</a>
  <a href="#hulajnogi">Hulajnogi</a>
  <a href="#kontakt">Kontakt</a>
</nav>

<section id="home">
  <h1>Najlepsze hulajnogi elektryczne</h1>
  <p>Kliknij gdziekolwiek, aby zobaczyć promocję!</p>
</section>

<section id="hulajnogi">
  <h2>Nasze hulajnogi</h2>
  <div class="container" id="scooters-container">
    <!-- Tutaj dodasz własne hulajnogi -->
  </div>
</section>

<section id="kontakt">
  <h2>Kontakt</h2>
  <p>Email: hulajnogi@sklep.pl</p>
</section>

<div id="flash"></div>

<audio id="sound" loop>
  <source src="nie-wiem_VQg1yPV.mp3">
</audio>

<script>
let started=false
let interval

// Tutaj dodajesz swoje hulajnogi w prosty sposób
const scooters = [
  {img:"pobrany plik5.jpg", name:"Kukirin G4", speed:"60 km/h", price:"999 zł"},
  {img:"pobrany plik3.png", name:"Kamikaze k1 max", speed:"55 km/h", price:"899 zł"},
  // dodaj kolejne hulajnogi tak:
  // {img:"hulajnoga3.jpg", name:"Nazwa", speed:"xx km/h", price:"xxxx zł"}
]

const container = document.getElementById("scooters-container")

scooters.forEach(s=>{
  const div = document.createElement("div")
  div.className="card"
  div.innerHTML=`
    <img src="${s.img}">
    <h3>${s.name}</h3>
    <p>${s.speed}</p>
    <p>${s.price}</p>
  `
  container.appendChild(div)
})

document.body.onclick=function(){
  if(started) return
  started=true

  // Miganie
  document.getElementById("flash").classList.add("flash")

  // Dźwięk
  let sound=document.getElementById("sound")
  sound.play()

  // Papieże
  interval=setInterval(function(){
    for(let i=0;i<6;i++){
      let img=document.createElement("img")
      img.src="pobrany plikk.jpg" // tutaj możesz podmienić plik na inny
      img.className="pope"
      img.style.left=Math.random()*window.innerWidth+"px"
      img.style.top=Math.random()*window.innerHeight+"px"
      document.body.appendChild(img)
    }
  },200)

  // Wyłączenie po 3 minutach
  setTimeout(function(){
    document.getElementById("flash").classList.remove("flash")
    sound.pause()
    sound.currentTime=0
    clearInterval(interval)
    document.querySelectorAll(".pope").forEach(e=>e.remove())
  },180000)
}
</script>

</body>
</html>
